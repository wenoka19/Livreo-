<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Tableau de bord — Livreo Admin</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <aside class="admin-sidebar" id="admin-sidebar"></aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <h1 class="admin-topbar-title">Tableau de bord</h1>
      <div class="admin-topbar-right">
        <div class="admin-user-badge">
          <div class="admin-user-avatar">A</div>
          <span>Admin</span>
        </div>
      </div>
    </header>

    <div class="admin-content">

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon green">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 6h12a4 4 0 0 1 4 4v10a2 2 0 0 1-2 2H6a4 4 0 0 1-4-4V6z"/>
            </svg>
          </div>
          <div>
            <p class="stat-value" id="stat-books">—</p>
            <p class="stat-label">Livres en catalogue</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
          </div>
          <div>
            <p class="stat-value" id="stat-orders">—</p>
            <p class="stat-label">Commandes totales</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div>
            <p class="stat-value" id="stat-pending">—</p>
            <p class="stat-label">En attente</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
          </div>
          <div>
            <p class="stat-value" id="stat-revenue">—</p>
            <p class="stat-label">Chiffre d'affaires (livré)</p>
          </div>
        </div>
      </div>

      <!-- Recent Orders -->
      <div class="admin-card">
        <div class="admin-card-header">
          <h2 class="admin-card-title">Dernières commandes</h2>
          <a href="commandes.html" class="btn-admin-secondary">Voir tout</a>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Numéro</th>
                <th>Client</th>
                <th>Ville</th>
                <th>Total</th>
                <th>Statut</th>
                <th>Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="recent-orders-tbody">
              <tr><td colspan="7" style="text-align:center;padding:var(--space-xl);color:var(--color-text-secondary);">Chargement...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="admin-toast"></div>

  <script src="../js/admin.js"></script>
  <script>
    async function loadDashboard() {
      try {
        const [statsRes, ordersRes] = await Promise.all([
          fetch('/api/admin/stats'),
          fetch('/api/orders?limit=10'),
        ]);

        if (statsRes.ok) {
          const stats = await statsRes.json();
          document.getElementById('stat-books').textContent = stats.totalBooks;
          document.getElementById('stat-orders').textContent = stats.totalOrders;
          document.getElementById('stat-pending').textContent = stats.pendingOrders;
          document.getElementById('stat-revenue').textContent = `${(stats.revenue || 0).toLocaleString('fr-FR')} FCFA`;
        } else {
          // Demo stats if API not accessible (no auth)
          document.getElementById('stat-books').textContent = '—';
          document.getElementById('stat-orders').textContent = '—';
          document.getElementById('stat-pending').textContent = '—';
          document.getElementById('stat-revenue').textContent = '—';
        }

        if (ordersRes.ok) {
          const data = await ordersRes.json();
          const orders = data.orders || data;
          renderRecentOrders(orders.slice(0, 10));
        }
      } catch {
        document.getElementById('recent-orders-tbody').innerHTML = `
          <tr><td colspan="7" style="text-align:center;padding:var(--space-xl);color:var(--color-text-secondary);">
            Impossible de charger les données (vérifiez la connexion serveur/BDD)
          </td></tr>`;
      }
    }

    function renderRecentOrders(orders) {
      const tbody = document.getElementById('recent-orders-tbody');
      if (!orders.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:var(--space-xl);color:var(--color-text-secondary);">Aucune commande</td></tr>';
        return;
      }
      tbody.innerHTML = orders.map(o => `
        <tr>
          <td><strong>${o.orderNumber || o._id?.slice(-6) || '—'}</strong></td>
          <td>${o.customer?.name || '—'}</td>
          <td>${o.customer?.city || '—'}</td>
          <td>${(o.total || 0).toLocaleString('fr-FR')} FCFA</td>
          <td>${AdminUtils.statusBadge(o.status)}</td>
          <td>${o.createdAt ? AdminUtils.formatDate(o.createdAt) : '—'}</td>
          <td>
            <a href="commandes.html?id=${o._id}" class="btn-icon edit" title="Voir">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </a>
          </td>
        </tr>`).join('');
    }

    document.addEventListener('DOMContentLoaded', async () => {
      AdminUtils.initAdminSidebar();
      await AdminUtils.requireAdminAuth();
      loadDashboard();
    });
  </script>
</body>
</html>
