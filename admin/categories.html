<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catégories — Livreo Admin</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <aside class="admin-sidebar" id="admin-sidebar"></aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <h1 class="admin-topbar-title">Gestion des catégories</h1>
    </header>

    <div class="admin-content">
      <div class="admin-card" style="max-width:600px;">
        <div class="admin-card-header">
          <h2 class="admin-card-title">Catégories (<span id="cat-count">0</span>)</h2>
        </div>

        <!-- Add category -->
        <div style="display:flex;gap:var(--space-md);margin-bottom:var(--space-xl);padding:var(--space-lg);background:var(--color-surface);border-radius:var(--radius-md);">
          <input type="text" id="new-cat-name" class="admin-search-input" placeholder="Nom de la catégorie..." style="flex:1;">
          <button class="btn-admin-primary" id="btn-add-cat">Ajouter</button>
        </div>

        <!-- Categories list -->
        <div id="cat-list">
          <p style="text-align:center;color:var(--color-text-secondary);padding:var(--space-xl);">Chargement...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <h2 class="modal-title">Renommer la catégorie</h2>
        <button class="modal-close" id="edit-modal-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div style="padding:var(--space-lg) 0;">
        <input type="hidden" id="edit-cat-id">
        <input type="text" id="edit-cat-name" class="admin-search-input" style="width:100%;" placeholder="Nom...">
      </div>
      <div style="display:flex;gap:var(--space-md);justify-content:flex-end;">
        <button class="btn-admin-secondary" id="edit-cancel">Annuler</button>
        <button class="btn-admin-primary" id="edit-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Confirm delete -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal" style="max-width:400px;text-align:center;">
      <p style="font-size:var(--font-size-md);margin-bottom:var(--space-xl);">Supprimer cette catégorie ?</p>
      <div style="display:flex;gap:var(--space-md);justify-content:center;">
        <button class="btn-admin-secondary" id="delete-cancel">Annuler</button>
        <button class="btn-admin-danger" id="delete-confirm">Supprimer</button>
      </div>
    </div>
  </div>

  <div class="toast" id="admin-toast"></div>

  <script src="../js/admin.js"></script>
  <script>
    let categories = [];
    let deletingId = null;

    async function loadCategories() {
      try {
        const res = await fetch('/api/categories');
        categories = await res.json();
        renderCategories();
      } catch {
        document.getElementById('cat-list').innerHTML = '<p style="color:var(--color-error);padding:var(--space-xl);text-align:center;">Erreur de chargement</p>';
      }
    }

    function renderCategories() {
      const list = document.getElementById('cat-list');
      document.getElementById('cat-count').textContent = categories.length;
      if (!categories.length) {
        list.innerHTML = '<p style="text-align:center;color:var(--color-text-secondary);padding:var(--space-xl);">Aucune catégorie</p>';
        return;
      }
      list.innerHTML = categories.map(cat => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:var(--space-md) var(--space-lg);border-bottom:1px solid var(--color-border);">
          <span style="font-weight:var(--font-weight-medium);">${cat.name}</span>
          <div class="action-btns">
            <button class="btn-icon edit" onclick="openEdit('${cat._id}', '${cat.name.replace(/'/g, "\\'")}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn-icon delete" onclick="openDelete('${cat._id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </div>
        </div>`).join('');
    }

    async function addCategory() {
      const name = document.getElementById('new-cat-name').value.trim();
      if (!name) return;
      try {
        const res = await fetch('/api/categories', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Erreur');
        document.getElementById('new-cat-name').value = '';
        AdminUtils.showAdminToast('Catégorie ajoutée !', 'success');
        loadCategories();
      } catch (err) {
        AdminUtils.showAdminToast(err.message, 'error');
      }
    }

    function openEdit(id, name) {
      document.getElementById('edit-cat-id').value = id;
      document.getElementById('edit-cat-name').value = name;
      document.getElementById('edit-modal').classList.add('open');
    }

    async function saveEdit() {
      const id = document.getElementById('edit-cat-id').value;
      const name = document.getElementById('edit-cat-name').value.trim();
      if (!name) return;
      try {
        const res = await fetch(`/api/categories/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Erreur');
        document.getElementById('edit-modal').classList.remove('open');
        AdminUtils.showAdminToast('Catégorie modifiée !', 'success');
        loadCategories();
      } catch (err) {
        AdminUtils.showAdminToast(err.message, 'error');
      }
    }

    function openDelete(id) {
      deletingId = id;
      document.getElementById('delete-modal').classList.add('open');
    }

    async function deleteCategory() {
      if (!deletingId) return;
      try {
        const res = await fetch(`/api/categories/${deletingId}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Erreur');
        document.getElementById('delete-modal').classList.remove('open');
        AdminUtils.showAdminToast('Catégorie supprimée', '');
        loadCategories();
      } catch (err) {
        AdminUtils.showAdminToast(err.message, 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      AdminUtils.initAdminSidebar();
      await AdminUtils.requireAdminAuth();
      loadCategories();

      document.getElementById('btn-add-cat').addEventListener('click', addCategory);
      document.getElementById('new-cat-name').addEventListener('keydown', e => { if (e.key === 'Enter') addCategory(); });
      document.getElementById('edit-modal-close').addEventListener('click', () => document.getElementById('edit-modal').classList.remove('open'));
      document.getElementById('edit-cancel').addEventListener('click', () => document.getElementById('edit-modal').classList.remove('open'));
      document.getElementById('edit-save').addEventListener('click', saveEdit);
      document.getElementById('delete-cancel').addEventListener('click', () => document.getElementById('delete-modal').classList.remove('open'));
      document.getElementById('delete-confirm').addEventListener('click', deleteCategory);
    });
  </script>
</body>
</html>
