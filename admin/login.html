<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Connexion Admin — Livreo</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-login-page">

  <div class="login-card">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 36 36" fill="none" stroke="#2E7D32" stroke-width="2" style="margin:0 auto var(--space-sm)">
        <path d="M4 6h12a4 4 0 0 1 4 4v18a3 3 0 0 0-3-3H4V6z"/>
        <path d="M32 6H20a4 4 0 0 0-4 4v18a3 3 0 0 1 3-3h13V6z"/>
      </svg>
      <p class="logo-text">Livreo</p>
    </div>

    <h1 class="login-title">Espace Administration</h1>
    <p class="login-subtitle">Connectez-vous pour gérer votre librairie</p>

    <div class="login-error" id="login-error"></div>

    <form class="login-form" id="login-form">
      <div class="form-group" style="margin-bottom:var(--space-lg);">
        <label class="form-label" for="username" style="display:block;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);margin-bottom:var(--space-sm);">
          Nom d'utilisateur
        </label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-input"
          style="width:100%;padding:var(--space-md);border:2px solid var(--color-border);border-radius:var(--radius-md);font-size:var(--font-size-base);outline:none;transition:border-color .15s;"
          placeholder="admin"
          required
          autocomplete="username"
          onfocus="this.style.borderColor='var(--color-primary)'"
          onblur="this.style.borderColor='var(--color-border)'"
        >
      </div>
      <div class="form-group" style="margin-bottom:var(--space-xl);">
        <label class="form-label" for="password" style="display:block;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);margin-bottom:var(--space-sm);">
          Mot de passe
        </label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          style="width:100%;padding:var(--space-md);border:2px solid var(--color-border);border-radius:var(--radius-md);font-size:var(--font-size-base);outline:none;transition:border-color .15s;"
          placeholder="••••••••"
          required
          autocomplete="current-password"
          onfocus="this.style.borderColor='var(--color-primary)'"
          onblur="this.style.borderColor='var(--color-border)'"
        >
      </div>

      <button
        type="submit"
        id="login-btn"
        style="width:100%;padding:var(--space-md);background:var(--color-primary);color:white;border:none;border-radius:var(--radius-full);font-size:var(--font-size-base);font-weight:var(--font-weight-bold);cursor:pointer;transition:background .15s;"
        onmouseover="this.style.background='var(--color-primary-dark)'"
        onmouseout="this.style.background='var(--color-primary)'"
      >
        Se connecter
      </button>
    </form>

    <p style="margin-top:var(--space-xl);font-size:var(--font-size-sm);color:var(--color-text-secondary);">
      <a href="../index.html" style="color:var(--color-primary);">← Retour à la boutique</a>
    </p>
  </div>

  <script>
    // Redirect if already logged in
    fetch('/api/admin/check').then(r => r.json()).then(data => {
      if (data.isAdmin) window.location.href = 'dashboard.html';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      errorEl.classList.remove('show');

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Connexion...';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = 'dashboard.html';
        } else {
          errorEl.textContent = data.message || 'Identifiants incorrects';
          errorEl.classList.add('show');
        }
      } catch {
        errorEl.textContent = 'Erreur de connexion au serveur';
        errorEl.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
